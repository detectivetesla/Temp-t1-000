<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - CalPay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <header class="top-header">
        <div class="logo-container">
            <a href="index.html" class="logo">
                <img src="Assets/images/calbank-logo.png" alt="CalBank">
            </a>
        </div>
        <div class="header-actions">
            <button class="btn btn-outline" style="padding: 6px 16px;" onclick="window.location.href='#'">Sign In</button>
            <button class="btn" style="background: transparent; border: none; color: #111827; font-weight: 600; padding: 6px 16px;">Help</button>
        </div>
    </header>

    <div class="auth-wrapper">
        <!-- Sidebar Area (Left) -->
        <div class="auth-sidebar">
            <div class="auth-steps-container">
                <div class="auth-step active">
                    <div class="step-icon">
                        <i class="fa-solid fa-circle-check" style="color: #f97316;"></i>
                    </div>
                    <div class="step-content">
                        <h4>Identification</h4>
                        <p>Provide your contact info and Ghana Card Number</p>
                    </div>
                </div>

                <div class="auth-step active">
                    <div class="step-icon">
                        <i class="fa-solid fa-circle-check" style="color: #f97316;"></i>
                    </div>
                    <div class="step-content">
                        <h4>Photo Verification</h4>
                        <p>Upload company certification documents</p>
                    </div>
                </div>

                <div class="auth-step active">
                    <div class="step-icon">
                        <i class="fa-solid fa-circle-check" style="color: #f97316;"></i>
                    </div>
                    <div class="step-content">
                        <h4>Create a Password</h4>
                        <p>Secure your account with a strong password</p>
                    </div>
                </div>
            </div>
            
            <div class="auth-sidebar-footer">
                &copy; CalBank PLC
            </div>
        </div>

        <!-- Main Content Area (Right) -->
        <div class="auth-main">
            <div class="auth-content-box" style="margin: 0; max-width: 440px;">
                <h1 class="auth-title" style="font-size: 28px; margin-bottom: 8px; font-weight: 800;">Verify OTP</h1>
                <p class="auth-subtitle" style="margin-bottom: 24px; color: #111827;">Enter the 6-digit code sent to +233********219</p>

                <div class="otp-inputs-container">
                    <input type="tel" class="otp-input" maxlength="1" oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
                    <input type="tel" class="otp-input" maxlength="1" oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
                    <input type="tel" class="otp-input" maxlength="1" oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
                    <input type="tel" class="otp-input" maxlength="1" oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
                    <input type="tel" class="otp-input" maxlength="1" oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
                    <input type="tel" class="otp-input" maxlength="1" oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
                </div>

                <button type="button" class="btn btn-primary btn-block auth-btn mt-24" id="submitOtpBtn">Verify</button>
            </div>
            
            <div class="auth-main-footer" style="padding-top: 100px;">
                <a href="#">Terms and Conditions</a>
                <a href="#">Privacy Policy</a>
            </div>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if(e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if(e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        document.getElementById('submitOtpBtn').addEventListener('click', () => {
            window.location.href = 'register-success.html';
        });
    </script>
</body>
</html>
