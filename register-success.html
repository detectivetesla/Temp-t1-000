<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Complete - CalPay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <header class="top-header">
        <div class="logo-container">
            <a href="index.html" class="logo">
                <img src="Assets/images/calbank-logo.png" alt="CalBank">
            </a>
        </div>
    </header>

    <div class="auth-wrapper">
        <!-- Full Bleed Image Area (Left) -->
        <div class="success-sidebar-image"></div>

        <!-- Main Success Messaging (Right) -->
        <div class="auth-main success-main">
            <div class="auth-content-box" style="max-width: 400px; text-align: center;">
                <h1 class="auth-title" style="font-size: 28px; margin-bottom: 16px; font-weight: 800; color: #111827;">Congratulations!</h1>
                <p class="auth-subtitle" style="margin-bottom: 32px; color: #475569; line-height: 1.5; font-size: 14px;">
                    Congratulations! Your account has been successfully created. Please proceed to sign in
                </p>

                <button type="button" class="btn btn-primary btn-block auth-btn" onclick="window.location.href='index.html'" style="max-width: 200px; margin: 0 auto; display: block;">Sign In</button>
            </div>
        </div>
    </div>
</body>
</html>
